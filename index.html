  <script>
    (function(){
      function main(){
        // 只為了「day3.html 自己預覽」：把 template 內容掛到畫面上
        var tpl = document.getElementById('tpl-day3');
        var mount = document.getElementById('previewMount');
        if(tpl && tpl.content && mount){
          mount.innerHTML = '';
          mount.appendChild(tpl.content.cloneNode(true));
        }

        // ===== Lightbox：點擊放大 + 左右切換 + 手勢滑動 =====
        var overlay = document.getElementById('lightbox');
        var lbImg = document.getElementById('lbImg');
        var lbCaption = document.getElementById('lbCaption');
        var btnClose = document.getElementById('lbClose');
        var btnPrev = document.getElementById('lbPrev');
        var btnNext = document.getElementById('lbNext');
        var stage = document.getElementById('lbStage');

        // 如果 Lightbox DOM 還沒出現（或被移除），就不要初始化，避免 console error
        if(!overlay || !lbImg || !lbCaption || !btnClose || !btnPrev || !btnNext || !stage){
          return;
        }

        var items = []; // {src, caption}
        var idx = 0;

        function collectItems(){
          items = [];
          var nodes = document.querySelectorAll('.gItem');
          nodes.forEach(function(n){
            // PDF 卡片不加入 lightbox 圖片清單
            if(n && n.dataset && n.dataset.pdfHref) return;
            var img = n.querySelector('img');
            if(!img) return;
            var src = img.getAttribute('data-full') || img.getAttribute('src') || '';
            var caption = n.getAttribute('data-caption') || img.getAttribute('alt') || '';
            items.push({src:src, caption:caption});
          });
        }

        function render(){
          if(!items.length) return;
          var it = items[idx];
          lbImg.src = it.src;
          lbImg.alt = it.caption || '圖片';
          lbCaption.textContent = it.caption || '';
        }

        function openAt(i){
          collectItems();
          if(!items.length) return;
          idx = Math.max(0, Math.min(i, items.length - 1));
          render();
          overlay.setAttribute('aria-hidden','false');
          document.body.style.overflow = 'hidden';
        }

        function close(){
          overlay.setAttribute('aria-hidden','true');
          document.body.style.overflow = '';
          lbImg.src = '';
        }

        function prev(){
          if(!items.length) return;
          idx = (idx - 1 + items.length) % items.length;
          render();
        }

        function next(){
          if(!items.length) return;
          idx = (idx + 1) % items.length;
          render();
        }

        function bindGalleryClicks(){
          var nodes = Array.prototype.slice.call(document.querySelectorAll('.gItem'));
          nodes.forEach(function(n){
            n.addEventListener('click', function(){
              // 如果是 PDF 卡片：直接開啟 PDF（不進 lightbox）
              if(n && n.dataset && n.dataset.pdfHref){
                window.open(n.dataset.pdfHref, '_blank', 'noopener');
                return;
              }
              collectItems();
              var img = n.querySelector('img');
              var src = img ? (img.getAttribute('data-full') || img.getAttribute('src') || '') : '';
              var i = items.findIndex(function(it){ return it.src === src; });
              openAt(i >= 0 ? i : 0);
            });
          });
        }

        // 點背景關閉（點到 panel 不關）
        overlay.addEventListener('click', function(e){
          if(e.target === overlay) close();
        });
        btnClose.addEventListener('click', close);
        btnPrev.addEventListener('click', prev);
        btnNext.addEventListener('click', next);

        // 鍵盤操作
        document.addEventListener('keydown', function(e){
          if(overlay.getAttribute('aria-hidden') === 'true') return;
          if(e.key === 'Escape') close();
          if(e.key === 'ArrowLeft') prev();
          if(e.key === 'ArrowRight') next();
        });

        // 觸控滑動切換
        var startX = 0;
        var startY = 0;
        var moved = false;
        stage.addEventListener('touchstart', function(e){
          if(!e.touches || !e.touches.length) return;
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          moved = false;
        }, {passive:true});

        stage.addEventListener('touchmove', function(e){
          if(!e.touches || !e.touches.length) return;
          var dx = e.touches[0].clientX - startX;
          var dy = e.touches[0].clientY - startY;
          if(Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) moved = true;
        }, {passive:true});

        stage.addEventListener('touchend', function(e){
          if(!moved) return;
          var endX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : startX;
          var dx = endX - startX;
          if(Math.abs(dx) < 40) return;
          if(dx < 0) next(); else prev();
        });

        // 初始化
        collectItems();
        bindGalleryClicks();
      }

      // 確保 Lightbox DOM 已經存在才初始化（避免你看到的 addEventListener null）
      if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', main);
      } else {
        main();
      }
    })();
  </script>


  <!-- Lightbox Modal -->
  <div class="lbOverlay" id="lightbox" aria-hidden="true" role="dialog" aria-label="圖片預覽">
    <div class="lbPanel" role="document">

        <div class="lbCaption" id="lbCaption"></div>

      <button class="lbNav lbNext" type="button" id="lbNext" aria-label="下一張">›</button>
      <div class="lbStage" id="lbStage">
        <img id="lbImg" alt="" src="" />
      </div>
    </div>
  </div>
