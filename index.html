<head>
  <meta charset="utf-8" />

  <style>
    :root{
      --bg:#f6f7fb;
      --surface:#ffffff;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --chip:#f3f4f6;
      --accent:#2563eb;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:var(--bg);color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Hiragino Sans", "Helvetica Neue", Arial;
      line-height:1.6;
    }
    a{color:inherit}
    .wrap{max-width:1100px;margin:0 auto;padding:22px 16px 26px}
    header{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
    h1{margin:0;font-size:20px;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:12px}

    .board{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--surface);
      box-shadow:var(--shadow);
      overflow:hidden;
      touch-action: pan-y;
    }

    .panel{padding:16px 14px 18px}

    .dayHeader{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
      padding:6px 6px 12px;
    }
    .dayHeaderRight{margin-left:auto;padding-top:10px}
    .dayDateRight{color:var(--text);font-size:18px;font-weight:800;line-height:1.2}
    .dayTitle{display:flex;gap:12px;align-items:center;}
    .num{
      width:40px;height:40px;border-radius:14px;
      display:grid;place-items:center;
      border:1px solid rgba(96,165,250,.45);
      background:rgba(96,165,250,.10);
      font-weight:800;
    }
    .tblock{min-width:0;padding-top:2px}
    .tblock h2{margin:0;font-size:18px;line-height:1.2}

    details{
      border:1px solid var(--line);
      border-radius:16px;
      background:#ffffff;
      overflow:hidden;
      margin-top:10px;
    }
    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 12px;
      display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      font-weight:700;
    }
    summary::-webkit-details-marker{display:none}
    summary span.sumText{
      flex:1;min-width:0;white-space:normal;word-break:break-word;line-height:1.5;
    }
    .chev{color:var(--muted);transition:transform .15s ease}
    details[open] .chev{transform:rotate(180deg)}
    .content{padding:0 12px 12px}
    .dContent{padding:0 14px 12px}

    .timeline{
      border:1px solid var(--line);
      border-radius:14px;
      background:#ffffff;
      overflow:hidden;
      --timeCol:92px;--tGap:12px;--tPad:12px;
    }
    .tRow{
      display:grid;
      grid-template-columns: 92px 1fr;
      gap:12px;
      padding:12px;
    }
    .tRow:last-child{border-bottom:none}
    .tRow > *{min-width:0;}
    .time{font-variant-numeric: tabular-nums;font-weight:800}
    .meta{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4}
    .place{font-weight:700}

    .timeline .alignWithMain{margin-left:calc(-1*(var(--timeCol) + var(--tGap) + var(--tPad)));margin-right:calc(-1*var(--tPad))}
    .timeline .alignPad{margin-left:calc(-1*var(--tPad));margin-right:calc(-1*var(--tPad))}
    .tRow .subline{grid-column:1 / -1;margin-top:2px}

    .dSplit{padding-top:6px}
    .dLabel{font-size:12px;font-weight:800;color:var(--text);opacity:.78;letter-spacing:.2px;margin:6px 0 4px}
    .dList{margin:0;padding-left:18px;color:var(--muted);font-size:13px;line-height:1.6}
    .dDivider{display:none;}

    .links{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .btn{
      text-decoration:none;
      font-size:12px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(96,165,250,.10);
    }

    .galleryWrap{margin-top:10px}
    .galleryTitle{margin:0 0 8px;padding:0 2px;font-weight:800;font-size:13px}
    .galleryRow{
      display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling: touch;
      touch-action: pan-x;overscroll-behavior-x: contain;
      padding-left:6px;padding-right:6px;padding-bottom:6px;
    }
    .galleryWrap.alignWithMain .galleryRow{
      padding-left:14px;
      padding-right:14px;
      scroll-padding-left:14px;
      scroll-padding-right:14px;
    }
    .galleryRow::-webkit-scrollbar{height:8px}
    .galleryRow::-webkit-scrollbar-thumb{background:rgba(17,24,39,.12);border-radius:999px}
    .galleryRow::-webkit-scrollbar-track{background:transparent}
    .gItem{
      flex:0 0 auto;
      width:220px !important;
      aspect-ratio:4/3 !important;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#fff;
      scroll-snap-align:start;
      box-shadow:0 6px 16px rgba(0,0,0,.06);
      cursor:pointer;
      position:relative
    }
    .gItem img{width:100%;height:100%;object-fit:cover;display:block}
    .gItem[data-caption]::after{
      content: attr(data-caption);
      position:absolute;left:8px; right:8px; bottom:8px;
      padding:6px 8px;border-radius:12px;
      background:rgba(17,24,39,.62);color:#fff;
      font-size:12px;line-height:1.35;letter-spacing:.2px;
      pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.25);
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }

    .metaList{margin:0;padding:0;list-style:none;display:grid;gap:6px}
    .metaList li{display:flex;gap:10px;align-items:flex-start}
    .metaIcon{flex:0 0 1.8em;display:inline-flex;align-items:center;justify-content:center;line-height:1.2}
    .metaText{flex:1;min-width:0}

    .editBar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      padding:12px 14px;border-bottom:1px solid var(--line);background:#fff;
    }
    .editHint{color:var(--muted);font-size:12px}

    @supports selector(.tRow:has(.galleryWrap)){
      .timeline .tRow:has(.galleryWrap[aria-label="停車照片"]) { padding-top: 2px; padding-bottom: 4px; }
      .timeline .tRow:has(.galleryWrap[aria-label="由布院小食照片"]) { padding-top: 2px; padding-bottom: 4px; }
      .timeline .tRow:has(.galleryWrap[aria-label="由布院照片"]) { padding-top: 0px; padding-bottom: 2px; }
      .timeline .tRow:has(.galleryWrap[aria-label="九重夢大吊橋照片"]) { padding-top: 2px; padding-bottom: 4px; }
      .timeline .tRow:has(.galleryWrap[aria-label="旅館華柚照片"]) { padding-top: 2px; padding-bottom: 4px; }
    }
    .timeline .galleryWrap[aria-label="停車照片"]{ margin-top: 0px; }
    .timeline .galleryWrap[aria-label="由布院小食照片"]{ margin-top: 0px; }
    .timeline .galleryWrap[aria-label="由布院照片"]{ margin-top: -10px; }
    .timeline .galleryWrap[aria-label="九重夢大吊橋照片"]{ margin-top: 0px; }
    .timeline .galleryWrap[aria-label="旅館華柚照片"]{ margin-top: 0px; }

    @media (max-width: 640px){
      .timeline{--timeCol:72px;--tGap:8px;--tPad:12px;}
      .tRow{grid-template-columns: 72px 1fr; gap:8px; padding:12px}
      .num{width:38px;height:38px}
      .tblock h2{font-size:17px}
    }
  </style>
</head>

          <div><div class="time"></div></div>
          <div>
            <details class="alignWithMain" style="margin-top:0">
              <summary><span class="sumText">🚗 取車前注意事項 / 行車重點提醒</span><span class="chev">⌄</span></summary>
              <div class="dContent">
                <div class="dSplit">
                  <div class="dLabel">取車前注意事項</div>
                  <ul class="dList">
                    <li><strong>取車時間預估：</strong>(總計約 30 - 60 分鐘)。</li>
                    <li><strong>ETC 卡確認：</strong>現場取車時請務必確認 ETC 卡是否已插入機器並能正常運作。</li>
                    <li><strong>外觀拍照錄影：</strong>取車時與店員巡視車身，若有任何細微刮痕或凹痕應立即提出，並建議自行拍照或錄影存證，避免還車糾紛。</li>
                    <li><strong>功能確認：</strong>檢查燈光（頭燈、轉向燈）、雨刷、空調是否正常，並熟悉導航系統的操作。</li>
                    <li><strong>油品種類/油量確認：</strong>通常是加Regular（レギュラー，紅色油槍），確認油箱是否有加滿。</li>
                    <li><strong>應急處理：</strong>索取中文緊急聯絡卡、確認三角架位置。</li>
                  </ul>

                  <div class="dDivider" role="separator" aria-hidden="true"></div>

                  <div class="dLabel">行車重點提醒</div>
                  <ul class="dList">
                    <li>日本為右駕。請隨時默念口訣：<strong style="color:#2563eb">「左小轉、右大轉」</strong>。</li>
                    <li>高速路段為主：注意速限與測速照相，保持車距。</li>
                    <li>經過收費站時，務必找有紫色「ETC」標誌的車道，並減速至 20km/h 以下讓感應器讀取。</li>
                    <li>在山路彎道或叉路時，特別容易因為習慣而開錯車道，務必跟著前車或注意地面箭頭標示。</li>
                  </ul>
                </div>
              </div>
            </details>
          </div>
        </div>

                <ul class="dList">
                  <li>至湯布院中央児童公園，周邊：湯布院停車場 (Yufuin Parking Lot)，不限時平日￥300，需自行準備零錢投進料金箱，步行至觀光大街約 3 分鐘。如遇停滿：NPC24H 湯布院湯之坪街道停車場。</li>
                  <li>金鱗湖入口處：金鱗湖入口前駐車場 (Kinrinkoiriguchizen Parking Lot)，位置在湖畔入口正對面，單日￥400，進場道路較窄，行駛時請多加留意行人。如遇停滿：Times 湯布院金鱗湖 (Times Yufuin Lake Kinrin)、湯布院停車場 (Yufuin Parking Lot)。</li>

                    <div class="gItem" role="listitem" data-caption="金鱗湖入口前駐車場｜入口前小屋"><img loading="lazy" src="day2/3.jpg" data-full="day2/3.jpg" alt="金鱗湖入口前駐車場"></div>

          <div>

            <div class="meta">從由布院 ➝ 九重，經由被選為「日本百名道」之一的「山並快速道路(縣道 11 號)」前往，部分路段彎道角度大有視覺盲點，直線道亦非常直，皆需特別注意時速表。另傍晚時分偶爾會有野生動物（如鹿或野兔）出沒。<div style="margin-top:6px;line-height:1.6;color:var(--muted)">📸 最美路段 長者原｜筆直的公路正對著冒煙的硫磺山與九重連山，視覺震撼力極強是全路段最著名的景點，可在那裡稍微停留約 5 分鐘拍照。</div><div style="margin-top:6px;line-height:1.6;color:var(--muted)">🌉 九重「夢」大吊橋｜為日本最高的人行吊橋，成人門票￥500可體驗如同在天上行走一般的感受，最後入場時間通常是 16:30（17:00 關門）。九重一帶午後易起霧，若天氣不佳可縮短吊橋停留。</div></div>
